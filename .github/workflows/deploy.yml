name: Deploy landing (Cloudflare)

# Deploys the IssueNumber.one landing (landings/; worker `issuenumberone`) to
# Cloudflare (Workers static assets) via the shared reusable cf-deploy
# workflow (sneat-co/cicd), so every Sneat site deploys the same way and every
# deploy is visible/auditable in GitHub Actions.
#
# Auth is org-level: CLOUDFLARE_API_TOKEN org secret + CLOUDFLARE_ACCOUNT_ID
# org variable (an identifier, not a secret). No per-repo secrets needed.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "landings/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: sneat-co/cicd/.github/workflows/cf-deploy.yml@main
    with:
      working-directory: landings
      build-command: pnpm build
      cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
